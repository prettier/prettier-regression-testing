name: "Update repositories.json"

on:
  workflow_dispatch:
  schedule:
    - cron: "00 01 1 * *"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  keep-scheduled-workflow-activity:
    permissions:
      actions: write
    uses: WaterLemons2k/scheduled-workflow-activity-action/.github/workflows/reusable.yml@v2

  update-repositories:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore cache
        uses: actions/cache@v5
        with:
          path: repositories
          key: v2-${{ hashFiles('repositories.json') }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Dependencies
        run: yarn

      - name: Run update-repositories.mjs
        run: node ./scripts/update-repositories.mjs

      - uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "Update repositories.json"
          branch: automated-update-repositories
          branch-suffix: timestamp
          title: "Update repositories.json"
